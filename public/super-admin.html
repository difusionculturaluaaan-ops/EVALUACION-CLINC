<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Admin - Evaluación Clínica Psicológica</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/super-admin-styles.css">
</head>
<body>
  <div id="super-admin-app">
    <!-- Si no autenticado, mostrar login -->
    <div id="login-page" class="page active">
      <div class="login-container">
        <h1>🔐 Super Admin</h1>
        <form onsubmit="superAdminApp.login(event)">
          <input type="email" id="admin-email" placeholder="Email" required>
          <input type="password" id="admin-password" placeholder="Contraseña" required>
          <button type="submit">Entrar</button>
          <p id="login-error" style="color: red; display: none; margin-top: 10px;"></p>
        </form>
      </div>
    </div>

    <!-- Si autenticado -->
    <div id="admin-panel" style="display: none;">
      <header class="admin-header">
        <h1>🏥 Super Admin - Evaluación Clínica</h1>
        <div class="header-right">
          <span id="admin-nombre"></span>
          <button onclick="superAdminApp.logout()">Salir</button>
        </div>
      </header>

      <div class="admin-content">
        <nav class="admin-sidebar">
          <button class="nav-btn active" data-page="dashboard">📊 Dashboard</button>
          <button class="nav-btn" data-page="tenants">🏢 Tenants</button>
          <button class="nav-btn" data-page="audit">📋 Auditoría</button>
        </nav>

        <main class="admin-main">
          <!-- Dashboard -->
          <section id="page-dashboard" class="page active">
            <h2>Dashboard Global</h2>
            <div class="stats-grid">
              <div class="stat-card">
                <div class="stat-label">Tenants Activos</div>
                <div class="stat-value" id="stat-tenants-activos">0</div>
              </div>
              <div class="stat-card">
                <div class="stat-label">Total Tenants</div>
                <div class="stat-value" id="stat-tenants-total">0</div>
              </div>
              <div class="stat-card">
                <div class="stat-label">Psicólogos</div>
                <div class="stat-value" id="stat-psicologos">0</div>
              </div>
              <div class="stat-card">
                <div class="stat-label">Pacientes</div>
                <div class="stat-value" id="stat-pacientes">0</div>
              </div>
            </div>
          </section>

          <!-- Tenants -->
          <section id="page-tenants" class="page">
            <h2>Gestión de Tenants</h2>
            <button onclick="superAdminApp.showCreateTenant()" class="btn btn-primary">+ Crear Tenant</button>
            <table id="tenants-table" class="admin-table">
              <thead>
                <tr>
                  <th>Nombre</th>
                  <th>Email Contacto</th>
                  <th>Estado</th>
                  <th>Creado</th>
                  <th>Usuarios</th>
                  <th>Pacientes</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </section>

          <!-- Auditoría -->
          <section id="page-audit" class="page">
            <h2>Log de Auditoría</h2>
            <table id="audit-table" class="admin-table">
              <thead>
                <tr>
                  <th>Timestamp</th>
                  <th>Acción</th>
                  <th>Tenant</th>
                  <th>Detalles</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </section>
        </main>
      </div>
    </div>
  </div>

  <!-- Modal para crear tenant -->
  <div id="create-tenant-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <span class="close" onclick="document.getElementById('create-tenant-modal').style.display = 'none'">&times;</span>
      <h2>Crear Nuevo Tenant</h2>
      <form onsubmit="superAdminApp.createTenant(event)">
        <input type="text" id="tenant-nombre" placeholder="Nombre del tenant" required>
        <input type="text" id="tenant-slug" placeholder="Slug (ej: clinica-1)" required>
        <input type="email" id="tenant-email" placeholder="Email de contacto (opcional)">
        <button type="submit">Crear</button>
      </form>
    </div>
  </div>

  <script src="js/super-admin-api.js"></script>
  <script src="js/super-admin-app.js"></script>
</body>
</html>
